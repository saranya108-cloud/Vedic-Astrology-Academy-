<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Jyotish Academy</title>
    <style>
        :root {
            --gold: #d4af37;
            --brown: #5d4037;
            --cream: #fffaf0;
            --accent: #a52a2a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f1ea;
            color: var(--brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* South Indian Grid Styling */
        .jyotish-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            width: 400px;
            height: 400px;
            border: 3px solid var(--brown);
            background-color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .cell {
            border: 1px solid #d2b48c;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            position: relative;
            cursor: pointer;
        }

        .cell:hover { background-color: var(--cream); }

        .empty-center {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background-color: var(--cream);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 2px solid var(--gold);
            font-weight: bold;
        }

        .sign-label { color: var(--accent); font-weight: bold; margin-bottom: 4px; }

        .planet-tag {
            background: var(--brown);
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            margin: 1px;
            font-size: 10px;
        }

        .lagna-tag { background: var(--gold); color: black; }

        /* Quiz & Education Panel */
        .panel {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            background: var(--brown);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
        }

        button:hover { background: var(--accent); }

        .quiz-option {
            background: #eee;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .quiz-option:hover { background: var(--gold); }

        .hidden { display: none; }

        .nak-list {
            max-height: 420px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .nak-card {
            border: 1px solid #d2b48c;
            border-left: 4px solid var(--gold);
            border-radius: 4px;
            padding: 8px 10px;
            margin: 6px 0;
            font-size: 13px;
        }

        .nak-card h4 {
            margin: 0 0 4px;
            color: var(--accent);
        }

        .nak-card .nak-degrees {
            color: #777;
            font-weight: normal;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <h1>Vedic Astrology Academy</h1>

    <div class="dashboard">
        <div>
            <div class="jyotish-grid" id="chartGrid">
                </div>
            <p style="text-align:center"><small>South Indian Style: Fixed Signs, Clockwise Houses</small></p>
        </div>

        <div class="panel" id="uiPanel">
            <div id="studyMode">
                <h3>Lesson: Reading the Chart</h3>
                <p id="lessonText">Select a box in the chart to learn about the Sign, House, and Ruler.</p>
                <h4 style="margin-bottom:4px">Module 1: Nakshatras</h4>
                <button onclick="showNakshatraGuide()">Explore the 27 Nakshatras</button>
                <button onclick="startNakshatraQuiz()">Start Nakshatra Quiz</button>
                <h4 style="margin-bottom:4px">Module 2: Planetary Yogas</h4>
                <button onclick="showYogaModule()">Explore Planetary Yogas</button>
                <button onclick="startYogaQuiz()">Start Yoga Quiz</button>
            </div>

            <div id="guideMode" class="hidden">
                <h3>The 27 Nakshatras</h3>
                <div id="nakshatraList" class="nak-list"></div>
                <button onclick="exitGuide()" style="background:#777">Back to Study</button>
            </div>

            <div id="yogaMode" class="hidden">
                <h3>Planetary Yogas</h3>
                <div style="display:flex; gap:5px;">
                    <button onclick="renderYogaList('Major')" style="width:50%">Major Yogas</button>
                    <button onclick="renderYogaList('Secondary')" style="width:50%">Secondary Yogas</button>
                </div>
                <div id="yogaList" class="nak-list"></div>
                <button onclick="exitYogaModule()" style="background:#777">Back to Study</button>
            </div>

            <div id="yogaQuizMode" class="hidden">
                <h3>Yoga Quiz</h3>
                <p id="yogaQuestionText"></p>
                <div id="yogaOptionsContainer"></div>
                <button onclick="exitYogaQuiz()" style="background:#777">Back to Study</button>
            </div>

            <div id="quizMode" class="hidden">
                <h3>Nakshatra Quiz</h3>
                <p id="questionText"></p>
                <div id="optionsContainer"></div>
                <button onclick="exitQuiz()" style="background:#777">Back to Study</button>
            </div>
        </div>
    </div>

    <script>
        const signs = [
            { name: "Aries", sans: "Mesha", ruler: "Mars" }, { name: "Taurus", sans: "Vrishaba", ruler: "Venus" },
            { name: "Gemini", sans: "Mithuna", ruler: "Mercury" }, { name: "Cancer", sans: "Karka", ruler: "Moon" },
            { name: "Leo", sans: "Simha", ruler: "Sun" }, { name: "Virgo", sans: "Kanya", ruler: "Mercury" },
            { name: "Libra", sans: "Tula", ruler: "Venus" }, { name: "Scorpio", sans: "Vrischika", ruler: "Mars" },
            { name: "Sagittarius", sans: "Dhanu", ruler: "Jupiter" }, { name: "Capricorn", sans: "Makara", ruler: "Saturn" },
            { name: "Aquarius", sans: "Kumbha", ruler: "Saturn" }, { name: "Pisces", sans: "Meena", ruler: "Jupiter" }
        ];

        const nakshatras = [
            { name: "Ashwini", symbol: "Horse's Head", deity: "Ashwini Kumaras", ruler: "Ketu", degrees: "0°00' – 13°20' Aries" },
            { name: "Bharani", symbol: "Yoni (Womb)", deity: "Yama", ruler: "Venus", degrees: "13°20' – 26°40' Aries" },
            { name: "Krittika", symbol: "Razor, Flame", deity: "Agni", ruler: "Sun", degrees: "26°40' Aries – 10°00' Taurus" },
            { name: "Rohini", symbol: "Chariot, Banyan Tree", deity: "Brahma", ruler: "Moon", degrees: "10°00' – 23°20' Taurus" },
            { name: "Mrigashira", symbol: "Deer's Head", deity: "Soma", ruler: "Mars", degrees: "23°20' Taurus – 6°40' Gemini" },
            { name: "Ardra", symbol: "Teardrop, Diamond", deity: "Rudra", ruler: "Rahu", degrees: "6°40' – 20°00' Gemini" },
            { name: "Punarvasu", symbol: "Bow and Quiver", deity: "Aditi", ruler: "Jupiter", degrees: "20°00' Gemini – 3°20' Cancer" },
            { name: "Pushya", symbol: "Cow's Udder, Lotus, Flower", deity: "Brihaspati", ruler: "Saturn", degrees: "3°20' – 16°40' Cancer" },
            { name: "Ashlesha", symbol: "Coiled Serpent", deity: "Nagas", ruler: "Mercury", degrees: "16°40' – 30°00' Cancer" },

            { name: "Purva Phalguni", symbol: "Hammock, Front Legs of a Bed", deity: "Bhaga", ruler: "Venus", degrees: "13°20' – 26°40' Leo" },
            { name: "Uttara Phalguni", symbol: "Back Legs of a Bed", deity: "Aryaman", ruler: "Sun", degrees: "26°40' Leo – 10°00' Virgo" },
            { name: "Hasta", symbol: "Hand, Fist", deity: "Savitar", ruler: "Moon", degrees: "10°00' – 23°20' Virgo" },
            { name: "Chitra", symbol: "Bright Jewel, Pearl", deity: "Vishvakarma", ruler: "Mars", degrees: "23°20' Virgo – 6°40' Libra" },
            { name: "Swati", symbol: "Young Sprout in Wind, Coral", deity: "Vayu", ruler: "Rahu", degrees: "6°40' – 20°00' Libra" },
            { name: "Vishakha", symbol: "Triumphal Arch, Potter's Wheel", deity: "Indra-Agni", ruler: "Jupiter", degrees: "20°00' Libra – 3°20' Scorpio" },
            { name: "Anuradha", symbol: "Lotus, Triumphal Archway", deity: "Mitra", ruler: "Saturn", degrees: "3°20' – 16°40' Scorpio" },

            { name: "Uttara Ashadha", symbol: "Elephant Tusk, Planks of a Bed", deity: "Vishvadevas", ruler: "Sun", degrees: "26°40' Sagittarius – 10°00' Capricorn" },

            { name: "Dhanishta", symbol: "Drum (Damaru), Flute", deity: "Eight Vasus", ruler: "Mars", degrees: "23°20' Capricorn – 6°40' Aquarius" },
            { name: "Shatabhisha", symbol: "Empty Circle, 100 Stars", deity: "Varuna", ruler: "Rahu", degrees: "6°40' – 20°00' Aquarius" },
            { name: "Purva Bhadrapada", symbol: "Sword, Front Legs of a Funeral Cot", deity: "Aja Ekapada", ruler: "Jupiter", degrees: "20°00' Aquarius – 3°20' Pisces" },
            { name: "Uttara Bhadrapada", symbol: "Twins, Back Legs of a Funeral Cot", deity: "Ahir Budhnya", ruler: "Saturn", degrees: "3°20' – 16°40' Pisces" },
            { name: "Revati", symbol: "Pair of Fish, Drum", deity: "Pushan", ruler: "Mercury", degrees: "16°40' – 30°00' Pisces" }
        ];

        const yogas = [
            // --- Major Yogas ---
            { name: "Gaja Kesari Yoga", rank: "Major", category: "Lunar", nature: "Auspicious",
              formation: "Jupiter is in a kendra (1st, 4th, 7th or 10th) from the Moon",
              effects: "Wisdom, lasting fame, respect from others and success in undertakings." },
            { name: "Ruchaka Yoga", rank: "Major", category: "Pancha Mahapurusha", nature: "Auspicious",
              formation: "Mars in its own sign (Aries/Scorpio) or exalted (Capricorn) in a kendra from the Lagna",
              effects: "Courage, physical strength, leadership and a commanding personality." },
            { name: "Bhadra Yoga", rank: "Major", category: "Pancha Mahapurusha", nature: "Auspicious",
              formation: "Mercury in its own sign (Gemini/Virgo) or exalted (Virgo) in a kendra from the Lagna",
              effects: "Sharp intellect, eloquent speech, business acumen and long life." },
            { name: "Hamsa Yoga", rank: "Major", category: "Pancha Mahapurusha", nature: "Auspicious",
              formation: "Jupiter in its own sign (Sagittarius/Pisces) or exalted (Cancer) in a kendra from the Lagna",
              effects: "Wisdom, spirituality, pure character and the respect of learned people." },
            { name: "Malavya Yoga", rank: "Major", category: "Pancha Mahapurusha", nature: "Auspicious",
              formation: "Venus in its own sign (Taurus/Libra) or exalted (Pisces) in a kendra from the Lagna",
              effects: "Beauty, artistic talent, luxuries, vehicles and marital happiness." },
            { name: "Shasha Yoga", rank: "Major", category: "Pancha Mahapurusha", nature: "Auspicious",
              formation: "Saturn in its own sign (Capricorn/Aquarius) or exalted (Libra) in a kendra from the Lagna",
              effects: "Authority over others, political power, discipline and command over masses." },
            { name: "Raja Yoga", rank: "Major", category: "Power", nature: "Auspicious",
              formation: "The lord of a kendra (1,4,7,10) associates with the lord of a trikona (1,5,9) by conjunction, mutual aspect or exchange",
              effects: "Power, high status, success and rise in life during the planets' dashas." },
            { name: "Dhana Yoga", rank: "Major", category: "Wealth", nature: "Auspicious",
              formation: "Lords of the wealth houses (2nd, 5th, 9th, 11th) connect with each other or with the Lagna lord",
              effects: "Accumulation of wealth and financial prosperity." },
            { name: "Viparita Raja Yoga", rank: "Major", category: "Power", nature: "Auspicious",
              formation: "Lords of the dusthanas (6th, 8th, 12th) occupy other dusthana houses",
              effects: "Sudden rise and success that comes through or after adversity." },
            { name: "Neecha Bhanga Raja Yoga", rank: "Major", category: "Power", nature: "Auspicious",
              formation: "A debilitated planet's weakness is cancelled, e.g. its dispositor is in a kendra from the Moon or Lagna",
              effects: "Early struggles transform into a remarkable rise and achievement." },
            { name: "Budha-Aditya Yoga", rank: "Major", category: "Solar", nature: "Auspicious",
              formation: "Sun and Mercury conjunct in the same sign (Mercury not combust)",
              effects: "Intelligence, analytical skill, administrative ability and good reputation." },
            { name: "Chandra-Mangala Yoga", rank: "Major", category: "Lunar", nature: "Auspicious",
              formation: "Moon and Mars conjunct or in mutual aspect",
              effects: "Strong earning ability, entrepreneurship and material drive." },
            { name: "Parivartana Yoga", rank: "Major", category: "Exchange", nature: "Mixed",
              formation: "Two planets occupy each other's signs (mutual exchange of sign lords)",
              effects: "The two houses involved become strongly linked; results depend on the houses exchanged." },
            // --- Secondary Yogas ---
            { name: "Sunapha Yoga", rank: "Secondary", category: "Lunar", nature: "Auspicious",
              formation: "A planet (other than the Sun) occupies the 2nd house from the Moon",
              effects: "Self-earned wealth, intelligence and a good reputation." },
            { name: "Anapha Yoga", rank: "Secondary", category: "Lunar", nature: "Auspicious",
              formation: "A planet (other than the Sun) occupies the 12th house from the Moon",
              effects: "Good health, virtuous character and contentment." },
            { name: "Durudhara Yoga", rank: "Secondary", category: "Lunar", nature: "Auspicious",
              formation: "Planets (other than the Sun) occupy both the 2nd and 12th houses from the Moon",
              effects: "Wealth, comforts, vehicles and generosity." },
            { name: "Kemadruma Yoga", rank: "Secondary", category: "Lunar", nature: "Challenging",
              formation: "No planets (other than the Sun) in the 2nd or 12th from the Moon, and the Moon unaspected",
              effects: "Struggles, loneliness and fluctuating fortunes unless cancelled by other factors." },
            { name: "Vesi Yoga", rank: "Secondary", category: "Solar", nature: "Auspicious",
              formation: "A planet (other than the Moon) occupies the 2nd house from the Sun",
              effects: "Truthfulness, balanced outlook and steady prosperity." },
            { name: "Vasi Yoga", rank: "Secondary", category: "Solar", nature: "Auspicious",
              formation: "A planet (other than the Moon) occupies the 12th house from the Sun",
              effects: "Charitable nature, skill and influence in one's circle." },
            { name: "Ubhayachari Yoga", rank: "Secondary", category: "Solar", nature: "Auspicious",
              formation: "Planets (other than the Moon) occupy both the 2nd and 12th houses from the Sun",
              effects: "All-round prosperity, eloquence and a pleasing personality." },
            { name: "Adhi Yoga", rank: "Secondary", category: "Lunar", nature: "Auspicious",
              formation: "Benefics (Mercury, Jupiter, Venus) occupy the 6th, 7th and 8th houses from the Moon",
              effects: "Leadership, victory over opponents, health and prosperity." },
            { name: "Amala Yoga", rank: "Secondary", category: "Career", nature: "Auspicious",
              formation: "A natural benefic occupies the 10th house from the Lagna or the Moon",
              effects: "Spotless reputation, ethical career and lasting fame." },
            { name: "Lakshmi Yoga", rank: "Secondary", category: "Wealth", nature: "Auspicious",
              formation: "The 9th lord is strong in a kendra or trikona in its own or exaltation sign, with a strong Lagna lord",
              effects: "Wealth, beauty, fortune and the blessings of Lakshmi." },
            { name: "Saraswati Yoga", rank: "Secondary", category: "Learning", nature: "Auspicious",
              formation: "Jupiter, Venus and Mercury occupy kendras, trikonas or the 2nd house, with Jupiter strong",
              effects: "Learning, eloquence, mastery of arts and sciences, and renown as a scholar." },
            { name: "Shakata Yoga", rank: "Secondary", category: "Lunar", nature: "Challenging",
              formation: "The Moon is in the 6th, 8th or 12th house from Jupiter",
              effects: "Fluctuating fortunes — periodic rises and falls in life." },
            { name: "Kala Sarpa Yoga", rank: "Secondary", category: "Nodal", nature: "Challenging",
              formation: "All seven classical planets are hemmed between Rahu and Ketu",
              effects: "An intense, karmic life path with dramatic ups and downs; can confer greatness after struggle." }
        ];

        // Mapping South Indian Grid Order (Start top-left-ish)
        const gridOrder = [11, 0, 1, 2, 10, -1, 3, 9, -1, 4, 8, 7, 6, 5];

        function initChart() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';

            gridOrder.forEach((signIdx, i) => {
                if (signIdx === -1) {
                    if (i === 5) grid.innerHTML += `<div class="empty-center">MY CHART</div>`;
                    return;
                }

                const sign = signs[signIdx];
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `<span class="sign-label">${sign.sans}</span>`;

                // Add an example Lagna in Taurus (Sign 1)
                if (signIdx === 1) cell.innerHTML += `<span class="planet-tag lagna-tag">AS (L)</span>`;
                // Add an example Sun in Leo (Sign 4)
                if (signIdx === 4) cell.innerHTML += `<span class="planet-tag">Sun</span>`;

                cell.onclick = () => showLesson(signIdx);
                grid.appendChild(cell);
            });
        }

        function showLesson(idx) {
            const sign = signs[idx];
            // Calculate house relative to Lagna in Taurus (idx 1)
            const house = ((idx - 1 + 12) % 12) + 1;

            document.getElementById('lessonText').innerHTML = `
                <strong>Sign:</strong> ${sign.sans} (${sign.name})<br>
                <strong>House:</strong> ${house}<br>
                <strong>Ruler:</strong> ${sign.ruler}<br><br>
                <em>"The ${house} house in ${sign.name} shows how you handle ${getHouseKeyword(house)}."</em>
            `;
        }

        function getHouseKeyword(h) {
            const keys = ["", "Self/Body", "Wealth", "Effort", "Home", "Children", "Health", "Partners", "Longevity", "Dharma", "Career", "Community & Group Activities", "Loss"];
            return keys[h];
        }

        // --- NAKSHATRA GUIDE ---
        function showNakshatraGuide() {
            document.getElementById('studyMode').classList.add('hidden');
            document.getElementById('guideMode').classList.remove('hidden');

            const list = document.getElementById('nakshatraList');
            list.innerHTML = '';

            nakshatras.forEach((n, i) => {
                const card = document.createElement('div');
                card.className = 'nak-card';
                card.innerHTML = `
                    <h4>${i + 1}. ${n.name} <span class="nak-degrees">${n.degrees}</span></h4>
                    <strong>Ruling Planet:</strong> ${n.ruler}<br>
                    <strong>Ruling Deity:</strong> ${n.deity}<br>
                    <strong>Symbols:</strong> ${n.symbol}
                `;
                list.appendChild(card);
            });
        }

        function exitGuide() {
            document.getElementById('studyMode').classList.remove('hidden');
            document.getElementById('guideMode').classList.add('hidden');
        }

        // --- YOGA MODULE ---
        function showYogaModule() {
            document.getElementById('studyMode').classList.add('hidden');
            document.getElementById('yogaMode').classList.remove('hidden');
            renderYogaList('Major');
        }

        function renderYogaList(rank) {
            const list = document.getElementById('yogaList');
            list.innerHTML = '';

            yogas.filter(y => y.rank === rank).forEach(y => {
                const card = document.createElement('div');
                card.className = 'nak-card';
                const natureColor = y.nature === 'Challenging' ? '#a52a2a' : (y.nature === 'Mixed' ? '#b8860b' : '#2e7d32');
                card.innerHTML = `
                    <h4>${y.name} <span class="nak-degrees">${y.category}</span></h4>
                    <strong>Nature:</strong> <span style="color:${natureColor}">${y.nature}</span><br>
                    <strong>Formation:</strong> ${y.formation}<br>
                    <strong>Effects:</strong> ${y.effects}
                `;
                list.appendChild(card);
            });
        }

        function exitYogaModule() {
            document.getElementById('studyMode').classList.remove('hidden');
            document.getElementById('yogaMode').classList.add('hidden');
        }

        // --- YOGA QUIZ ---
        function startYogaQuiz() {
            document.getElementById('studyMode').classList.add('hidden');
            document.getElementById('yogaQuizMode').classList.remove('hidden');
            nextYogaQuestion();
        }

        function nextYogaQuestion() {
            const quest = yogas[Math.floor(Math.random() * yogas.length)];
            document.getElementById('yogaQuestionText').innerHTML = `Which yoga is formed when <b>${quest.formation.toLowerCase()}</b>?`;

            const container = document.getElementById('yogaOptionsContainer');
            container.innerHTML = '';

            const wrong = yogas.filter(y => y.name !== quest.name)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);
            const options = [quest, ...wrong].sort(() => Math.random() - 0.5);

            options.forEach(y => {
                const opt = document.createElement('div');
                opt.className = 'quiz-option';
                opt.innerText = y.name;
                opt.onclick = () => {
                    if(y.name === quest.name) {
                        alert(`Correct! ${quest.name} (${quest.nature})\nEffects: ${quest.effects}`);
                        nextYogaQuestion();
                    } else {
                        alert("Try again!");
                    }
                };
                container.appendChild(opt);
            });
        }

        function exitYogaQuiz() {
            document.getElementById('studyMode').classList.remove('hidden');
            document.getElementById('yogaQuizMode').classList.add('hidden');
        }

        // --- QUIZ LOGIC ---
        function startNakshatraQuiz() {
            document.getElementById('studyMode').classList.add('hidden');
            document.getElementById('quizMode').classList.remove('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            const quest = nakshatras[Math.floor(Math.random() * nakshatras.length)];
            document.getElementById('questionText').innerHTML = `Which Nakshatra is represented by the symbol <b>${quest.symbol}</b>?`;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            // Show the correct answer plus 3 random wrong ones, shuffled
            const wrong = nakshatras.filter(n => n.name !== quest.name)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);
            const options = [quest, ...wrong].sort(() => Math.random() - 0.5);

            options.forEach(n => {
                const opt = document.createElement('div');
                opt.className = 'quiz-option';
                opt.innerText = n.name;
                opt.onclick = () => {
                    if(n.name === quest.name) {
                        alert(`Correct! ${quest.name} (${quest.degrees})\nRuling Planet: ${quest.ruler}\nDeity: ${quest.deity}`);
                        nextQuestion();
                    } else {
                        alert("Try again!");
                    }
                };
                container.appendChild(opt);
            });
        }

        function exitQuiz() {
            document.getElementById('studyMode').classList.remove('hidden');
            document.getElementById('quizMode').classList.add('hidden');
        }

        initChart();
    </script>
</body>
</html>
