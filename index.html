<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Jyotish Academy</title>
    <style>
        :root {
            --gold: #d4af37;
            --brown: #5d4037;
            --cream: #fffaf0;
            --accent: #a52a2a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f1ea;
            color: var(--brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* South Indian Grid Styling */
        .jyotish-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            width: 400px;
            height: 400px;
            border: 3px solid var(--brown);
            background-color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .cell {
            border: 1px solid #d2b48c;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            position: relative;
            cursor: pointer;
        }

        .cell:hover { background-color: var(--cream); }

        .empty-center {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background-color: var(--cream);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 2px solid var(--gold);
            font-weight: bold;
        }

        .sign-label { color: var(--accent); font-weight: bold; margin-bottom: 4px; }

        .planet-tag {
            background: var(--brown);
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            margin: 1px;
            font-size: 10px;
        }

        .lagna-tag { background: var(--gold); color: black; }

        /* Quiz & Education Panel */
        .panel {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            background: var(--brown);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
        }

        button:hover { background: var(--accent); }

        .quiz-option {
            background: #eee;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .quiz-option:hover { background: var(--gold); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Vedic Astrology Academy</h1>

    <div class="dashboard">
        <div>
            <div class="jyotish-grid" id="chartGrid">
                </div>
            <p style="text-align:center"><small>South Indian Style: Fixed Signs, Clockwise Houses</small></p>
        </div>

        <div class="panel" id="uiPanel">
            <div id="studyMode">
                <h3>Lesson: Reading the Chart</h3>
                <p id="lessonText">Select a box in the chart to learn about the Sign, House, and Ruler.</p>
                <button onclick="startNakshatraQuiz()">Start Nakshatra Quiz</button>
            </div>

            <div id="quizMode" class="hidden">
                <h3>Nakshatra Quiz</h3>
                <p id="questionText"></p>
                <div id="optionsContainer"></div>
                <button onclick="exitQuiz()" style="background:#777">Back to Study</button>
            </div>
        </div>
    </div>

    <script>
        const signs = [
            { name: "Aries", sans: "Mesha", ruler: "Mars" }, { name: "Taurus", sans: "Vrishaba", ruler: "Venus" },
            { name: "Gemini", sans: "Mithuna", ruler: "Mercury" }, { name: "Cancer", sans: "Karka", ruler: "Moon" },
            { name: "Leo", sans: "Simha", ruler: "Sun" }, { name: "Virgo", sans: "Kanya", ruler: "Mercury" },
            { name: "Libra", sans: "Tula", ruler: "Venus" }, { name: "Scorpio", sans: "Vrischika", ruler: "Mars" },
            { name: "Sagittarius", sans: "Dhanu", ruler: "Jupiter" }, { name: "Capricorn", sans: "Makara", ruler: "Saturn" },
            { name: "Aquarius", sans: "Kumbha", ruler: "Saturn" }, { name: "Pisces", sans: "Meena", ruler: "Jupiter" }
        ];

        const nakshatras = [
            { name: "Ashwini", symbol: "Horse Head", deity: "Ashwini Kumaras" },
            { name: "Bharani", symbol: "Yoni", deity: "Yama" },
            { name: "Pushya", symbol: "Flower", deity: "Brihaspati" },
            { name: "Magha", symbol: "Throne", deity: "Pitris" },
            { name: "Chitra", symbol: "Jewel", deity: "Vishvakarma" }
        ];

        // Mapping South Indian Grid Order (Start top-left-ish)
        const gridOrder = [11, 0, 1, 2, 10, -1, 3, 9, -1, 4, 8, 7, 6, 5];

        function initChart() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';

            gridOrder.forEach((signIdx, i) => {
                if (signIdx === -1) {
                    if (i === 5) grid.innerHTML += `<div class="empty-center">MY CHART</div>`;
                    return;
                }

                const sign = signs[signIdx];
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `<span class="sign-label">${sign.sans}</span>`;

                // Add an example Lagna in Taurus (Sign 1)
                if (signIdx === 1) cell.innerHTML += `<span class="planet-tag lagna-tag">AS (L)</span>`;
                // Add an example Sun in Leo (Sign 4)
                if (signIdx === 4) cell.innerHTML += `<span class="planet-tag">Sun</span>`;

                cell.onclick = () => showLesson(signIdx);
                grid.appendChild(cell);
            });
        }

        function showLesson(idx) {
            const sign = signs[idx];
            // Calculate house relative to Lagna in Taurus (idx 1)
            const house = ((idx - 1 + 12) % 12) + 1;

            document.getElementById('lessonText').innerHTML = `
                <strong>Sign:</strong> ${sign.sans} (${sign.name})<br>
                <strong>House:</strong> ${house}<br>
                <strong>Ruler:</strong> ${sign.ruler}<br><br>
                <em>"The ${house} house in ${sign.name} shows how you handle ${getHouseKeyword(house)}."</em>
            `;
        }

        function getHouseKeyword(h) {
            const keys = ["", "Self/Body", "Wealth", "Effort", "Home", "Children", "Health", "Partners", "Longevity", "Dharma", "Career", "Gains", "Loss"];
            return keys[h];
        }

        // --- QUIZ LOGIC ---
        function startNakshatraQuiz() {
            document.getElementById('studyMode').classList.add('hidden');
            document.getElementById('quizMode').classList.remove('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            const quest = nakshatras[Math.floor(Math.random() * nakshatras.length)];
            document.getElementById('questionText').innerHTML = `Which Nakshatra is represented by the symbol <b>${quest.symbol}</b>?`;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            nakshatras.forEach(n => {
                const opt = document.createElement('div');
                opt.className = 'quiz-option';
                opt.innerText = n.name;
                opt.onclick = () => {
                    if(n.name === quest.name) {
                        alert("Correct! It's ruled by " + quest.deity);
                        nextQuestion();
                    } else {
                        alert("Try again!");
                    }
                };
                container.appendChild(opt);
            });
        }

        function exitQuiz() {
            document.getElementById('studyMode').classList.remove('hidden');
            document.getElementById('quizMode').classList.add('hidden');
        }

        initChart();
    </script>
</body>
</html>
